name: main

on:
  pull_request:
  push:
    branches: [main]

permissions: {}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      project_files: ${{ steps.filter.outputs.project_files }}
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false
    - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
      id: filter
      with:
        filters: |
          project_files:
            - .github/workflows/main.yml
            - '**/*.rs'
            - Cargo.toml
            - Cargo.lock

  lint-real:
    needs: [changes]
    if: needs.changes.outputs.project_files == 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false
    - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      with:
        components: rustfmt, clippy
    - run: cargo fmt --locked --check
    - run: cargo clippy --locked -- -D warnings

  test-real:
    needs: [changes]
    if: needs.changes.outputs.project_files == 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false
    - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      with:
        components: llvm-tools-preview
    - uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
      with:
        tool: cargo-llvm-cov
    - run: cargo llvm-cov --locked --fail-under-lines 100 --ignore-filename-regex 'src/main\.rs'

  main:
    needs: [changes, lint-real, test-real]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - env:
        PROJECT_FILES: ${{ needs.changes.outputs.project_files }}
        LINT_REAL_RESULT: ${{ needs.lint-real.result }}
        TEST_REAL_RESULT: ${{ needs.test-real.result }}
      run: |
        if [ "$PROJECT_FILES" != "true" ]; then
          exit 0
        fi
        if [ "$LINT_REAL_RESULT" != "success" ]; then
          exit 1
        fi
        if [ "$TEST_REAL_RESULT" != "success" ]; then
          exit 1
        fi
