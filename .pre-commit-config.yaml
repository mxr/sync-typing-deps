ci:
  skip: [fmt, clippy] # rust isnt available in CI

repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
  hooks:
  - id: check-toml
  - id: check-yaml
  - id: end-of-file-fixer
  - id: trailing-whitespace
- repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
  rev: 4380fbb73a154b5f5624794c1c78d9719ccc860f  # frozen: v2.16.0
  hooks:
  - id: pretty-format-toml
    args: [--autofix, --trailing-commas]
    exclude: Cargo.lock
  - id: pretty-format-yaml
    args: [--autofix]
- repo: https://github.com/doublify/pre-commit-rust
  rev: eeee35a89e69d5772bdee97db1a6a898467b686e  # frozen: v1.0
  hooks:
  - id: fmt
  - id: clippy
- repo: https://github.com/zizmorcore/zizmor-pre-commit
  rev: 9257c6050c0261b8c57e712f632dc4a8010109a9  # frozen: v1.25.2
  hooks:
  - id: zizmor
    args: [--no-progress, --fix]
